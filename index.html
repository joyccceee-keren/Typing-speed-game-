<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Test</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 900;
    color: #111;
    margin-bottom: 6px;
  }

  h1 span { color: #00c96e; }

  .subtitle {
    font-size: 0.8rem;
    color: #999;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  /* ── Stats row ── */
  .stats {
    display: flex;
    gap: 0;
    background: #fff;
    border: 2px solid #e8f5ee;
    border-radius: 14px;
    overflow: hidden;
    width: 100%;
    max-width: 800px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,201,110,0.08);
  }

  .stat {
    flex: 1;
    text-align: center;
    padding: 18px 10px;
    border-right: 1px solid #e8f5ee;
  }
  .stat:last-child { border-right: none; }

  .stat-num {
    font-size: 2.2rem;
    font-weight: 800;
    color: #111;
    font-family: 'Courier New', monospace;
    display: block;
    line-height: 1;
  }
  .stat-num.green { color: #00c96e; }
  .stat-num.red   { color: #e8334a; }

  .stat-lbl {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #aaa;
    font-weight: 600;
    margin-top: 4px;
    display: block;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    width: 100%;
    max-width: 800px;
    margin-bottom: 16px;
    background: #f9fdf9;
    border: 1px solid #e0ede6;
    border-radius: 12px;
    padding: 12px 18px;
  }

  .controls label { font-size: 0.82rem; color: #666; font-weight: 500; }

  .controls select {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 7px;
    font-size: 0.85rem;
    background: #fff;
    color: #111;
    cursor: pointer;
    outline: none;
  }
  .controls select:focus { border-color: #00c96e; }

  .btn-new {
    margin-left: auto;
    background: #00c96e;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 22px;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,201,110,0.3);
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .btn-new:hover { box-shadow: 0 6px 20px rgba(0,201,110,0.45); transform: translateY(-1px); }

  /* ── Passage box ── */
  .passage-wrap {
    width: 100%;
    max-width: 800px;
    background: #f9fdf9;
    border: 2px solid #c8e6d4;
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 16px;
    cursor: text;
    min-height: 120px;
    box-shadow: 0 2px 16px rgba(0,201,110,0.06);
  }

  .passage-wrap p {
    font-family: 'Courier New', monospace;
    font-size: 1.25rem;
    line-height: 2.2;
    letter-spacing: 0.04em;
    color: #bbb;
    word-break: break-word;
  }

  /* character states */
  .ch         { color: #bbb; }
  .ch.correct { color: #00c96e; }
  .ch.wrong   { color: #e8334a; text-decoration: underline wavy #e8334a; }
  .ch.cursor  {
    background: rgba(0,201,110,0.18);
    border-radius: 3px;
    outline: 2px solid #00c96e;
    color: #111;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%,100% { outline-color: #00c96e; }
    50%      { outline-color: transparent; }
  }

  /* ── Input box ── */
  .typebox {
    width: 100%;
    max-width: 800px;
    padding: 16px 20px;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    border: 2px solid #c8e6d4;
    border-radius: 14px;
    outline: none;
    resize: none;
    height: 80px;
    color: #111;
    background: #fff;
    caret-color: #00c96e;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  .typebox:focus {
    border-color: #00c96e;
    box-shadow: 0 0 0 4px rgba(0,201,110,0.12);
  }
  .typebox:disabled { opacity: 0.35; cursor: not-allowed; }
  .typebox::placeholder { color: #bbb; }

  /* ── Hint ── */
  .hint {
    font-size: 0.78rem;
    color: #aaa;
    text-align: center;
    margin-top: -14px;
    margin-bottom: 20px;
  }

  /* ── Leaderboard ── */
  .lb {
    width: 100%;
    max-width: 800px;
    background: #f9fdf9;
    border: 1px solid #e0ede6;
    border-radius: 14px;
    padding: 20px 24px;
  }
  .lb h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #aaa;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .lb table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .lb th {
    text-align: left;
    color: #bbb;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 4px 8px;
    border-bottom: 1px solid #e8f0ec;
  }
  .lb td { padding: 8px 8px; border-bottom: 1px solid #f0f7f3; color: #555; }
  .lb tr:last-child td { border-bottom: none; }
  .lb .wpm-td { color: #00c96e; font-weight: 800; font-family: 'Courier New', monospace; }
  .lb .empty  { color: #bbb; font-style: italic; font-size: 0.82rem; padding: 8px; }
  .lb .gold   td:first-child { color: #d97706; font-weight: 700; }
  .lb .silver td:first-child { color: #64748b; font-weight: 700; }
  .lb .bronze td:first-child { color: #92400e; font-weight: 700; }
  .btn-clear {
    margin-top: 10px;
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 4px 14px;
    font-size: 0.75rem;
    color: #aaa;
    cursor: pointer;
  }
  .btn-clear:hover { border-color: #e8334a; color: #e8334a; }

  /* ── Results overlay ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(8px);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #overlay.show { display: flex; }

  .result-card {
    background: #fff;
    border: 2px solid #c8e6d4;
    border-radius: 20px;
    padding: 40px 48px;
    text-align: center;
    min-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #00c96e, transparent);
    border-radius: 3px;
  }

  @keyframes pop {
    from { opacity:0; transform: scale(0.8); }
    to   { opacity:1; transform: scale(1); }
  }

  .result-card h2 { font-size: 1.8rem; font-weight: 900; color: #111; margin-bottom: 8px; }

  .new-best {
    display: inline-block;
    background: #fffbeb;
    border: 1px solid #fcd34d;
    color: #b45309;
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .r-box {
    background: #f9fdf9;
    border: 1px solid #e0ede6;
    border-radius: 12px;
    padding: 16px;
  }
  .r-num {
    font-size: 2.2rem;
    font-weight: 800;
    color: #111;
    font-family: 'Courier New', monospace;
    display: block;
    line-height: 1;
  }
  .r-box:first-child .r-num { color: #00c96e; }
  .r-lbl {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #aaa;
    font-weight: 600;
    margin-top: 4px;
    display: block;
  }

  .btn-again {
    background: #00c96e;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 48px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    margin-top: 16px;
    box-shadow: 0 6px 20px rgba(0,201,110,0.35);
    transition: transform 0.1s;
  }
  .btn-again:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<h1>type<span>.</span>race</h1>
<p class="subtitle">Ghost Race &nbsp;·&nbsp; Heatmap &nbsp;·&nbsp; Leaderboard</p>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <span class="stat-num green" id="s-wpm">0</span>
    <span class="stat-lbl">WPM</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="s-acc">100</span>
    <span class="stat-lbl">Accuracy %</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="s-time">60</span>
    <span class="stat-lbl">Seconds</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="s-err">0</span>
    <span class="stat-lbl">Errors</span>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <label for="sel-diff">Difficulty</label>
  <select id="sel-diff">
    <option value="easy">Easy</option>
    <option value="medium" selected>Medium</option>
    <option value="hard">Hard</option>
  </select>

  <label for="sel-time">Time</label>
  <select id="sel-time">
    <option value="30">30s</option>
    <option value="60" selected>60s</option>
    <option value="120">120s</option>
  </select>

  <button class="btn-new" id="btn-new">New Test</button>
</div>

<!-- Passage display -->
<div class="passage-wrap" id="passage-wrap">
  <p id="passage-text"></p>
</div>

<!-- Typing input -->
<textarea
  id="typebox"
  class="typebox"
  placeholder="👆 Click here and start typing the text above..."
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
></textarea>
<p class="hint">Tab = restart &nbsp;|&nbsp; Type the highlighted text above</p>

<!-- Leaderboard -->
<div class="lb">
  <h3>Personal Best &nbsp;<span id="lb-mode" style="font-weight:400;text-transform:none;letter-spacing:0">(medium · 60s)</span></h3>
  <table>
    <thead>
      <tr>
        <th>#</th><th>WPM</th><th>Accuracy</th><th>Errors</th><th>Date</th>
      </tr>
    </thead>
    <tbody id="lb-body"></tbody>
  </table>
  <button class="btn-clear" id="btn-clear">Clear</button>
</div>

<!-- Results overlay -->
<div id="overlay">
  <div class="result-card">
    <h2>Your Results</h2>
    <div class="new-best" id="new-best" style="display:none">🏆 New Personal Best!</div>
    <div class="result-grid">
      <div class="r-box"><span class="r-num" id="r-wpm">0</span><span class="r-lbl">WPM</span></div>
      <div class="r-box"><span class="r-num" id="r-acc">0</span><span class="r-lbl">Accuracy %</span></div>
      <div class="r-box"><span class="r-num" id="r-err">0</span><span class="r-lbl">Errors</span></div>
      <div class="r-box"><span class="r-num" id="r-chr">0</span><span class="r-lbl">Characters</span></div>
    </div>
    <button class="btn-again" id="btn-again">Play Again</button>
  </div>
</div>

<script>
// ── Passages ──────────────────────────────────────────────────────────────────
var PASSAGES = {
  easy: [
    "the sun rises in the east and sets in the west birds sing in the morning and the sky turns pink at dawn a gentle breeze blows through the trees",
    "dogs are loyal animals that love to play and run they wag their tails when they are happy and bark to warn their owners a good dog is a true friend",
    "reading books is a great way to learn new things you can travel to far away places without leaving your chair books open the door to a world of ideas",
    "the ocean is vast and deep and full of life fish swim in schools near the coral reefs waves crash on the shore and the salt air smells fresh and clean",
    "cooking at home can be fun and rewarding fresh ingredients make a big difference in taste a simple meal made with care is often better than eating out",
  ],
  medium: [
    "the quick brown fox jumps over the lazy dog pack my box with five dozen liquor jugs how vexingly quick daft zebras jump the five boxing wizards jump quickly",
    "programming is the art of telling a computer what to do it requires logical thinking patience and creativity every bug you fix makes you a better developer",
    "artificial intelligence is transforming the way we work and live machine learning models can recognize patterns in data that humans might miss",
    "the human brain contains roughly eighty six billion neurons each connected to thousands of others this network gives rise to consciousness memory and emotion",
    "mountains are formed over millions of years through tectonic activity glaciers carve valleys and shape the landscape the highest peaks are covered in snow year round",
  ],
  hard: [
    "cryptography underpins modern digital security by transforming plaintext into ciphertext using mathematical algorithms asymmetric encryption relies on key pairs for secure communication",
    "quantum mechanics describes the behavior of particles at subatomic scales where classical physics breaks down superposition allows a particle to exist in multiple states simultaneously",
    "the byzantine generals problem illustrates the challenge of achieving consensus in a distributed system where some participants may act maliciously blockchain technology addresses this",
    "epigenetics studies heritable changes in gene expression that do not involve alterations to the underlying dna sequence environmental factors can modify histone proteins or methylate cytosine",
    "phenomenological philosophy investigates the structures of experience and consciousness rather than asking what exists independently of the mind it examines how objects present themselves to a subject",
  ],
};

// ── State ─────────────────────────────────────────────────────────────────────
var passage   = '';
var chars     = [];   // array of span elements
var curIdx    = 0;
var started   = false;
var finished  = false;
var totalTyped = 0;
var errors    = 0;
var timerMax  = 60;
var timeLeft  = 60;
var ticker    = null;

// ── Elements ──────────────────────────────────────────────────────────────────
var elWpm     = document.getElementById('s-wpm');
var elAcc     = document.getElementById('s-acc');
var elTime    = document.getElementById('s-time');
var elErr     = document.getElementById('s-err');
var elPassage = document.getElementById('passage-text');
var elBox     = document.getElementById('typebox');
var elOverlay = document.getElementById('overlay');
var elNewBest = document.getElementById('new-best');
var elRwpm    = document.getElementById('r-wpm');
var elRacc    = document.getElementById('r-acc');
var elRerr    = document.getElementById('r-err');
var elRchr    = document.getElementById('r-chr');
var elLbBody  = document.getElementById('lb-body');
var elLbMode  = document.getElementById('lb-mode');
var selDiff   = document.getElementById('sel-diff');
var selTime   = document.getElementById('sel-time');

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  // clear timer
  if (ticker) { clearInterval(ticker); ticker = null; }

  // hide overlay
  elOverlay.classList.remove('show');

  // pick passage
  var diff  = selDiff.value;
  timerMax  = parseInt(selTime.value, 10);
  timeLeft  = timerMax;
  var pool  = PASSAGES[diff];
  passage   = pool[Math.floor(Math.random() * pool.length)];

  // reset state
  curIdx     = 0;
  started    = false;
  finished   = false;
  totalTyped = 0;
  errors     = 0;

  // render passage as individual spans
  elPassage.innerHTML = '';
  chars = [];
  for (var i = 0; i < passage.length; i++) {
    var sp = document.createElement('span');
    sp.className = 'ch';
    sp.textContent = passage[i] === ' ' ? '\u00A0' : passage[i];
    elPassage.appendChild(sp);
    chars.push(sp);
  }

  // highlight first char
  if (chars.length > 0) chars[0].classList.add('cursor');

  // reset stats
  elWpm.textContent  = '0';
  elWpm.className    = 'stat-num green';
  elAcc.textContent  = '100';
  elTime.textContent = timerMax;
  elTime.className   = 'stat-num';
  elErr.textContent  = '0';

  // clear input
  elBox.value    = '';
  elBox.disabled = false;
  elBox.focus();

  renderLB();
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer() {
  ticker = setInterval(function() {
    timeLeft--;
    elTime.textContent = timeLeft;
    if (timeLeft <= 10) elTime.className = 'stat-num red';
    refreshWpm();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

// ── Typing ────────────────────────────────────────────────────────────────────
elBox.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') { e.preventDefault(); init(); }
});

elBox.addEventListener('input', function() {
  if (finished) return;

  var typed = elBox.value;
  var tLen  = typed.length;

  // start timer on first keystroke
  if (!started && tLen > 0) {
    started = true;
    startTimer();
  }

  // process new chars
  if (tLen > curIdx) {
    for (var i = curIdx; i < tLen; i++) {
      if (i >= chars.length) break;
      totalTyped++;
      chars[i].classList.remove('cursor');
      if (typed[i] === passage[i]) {
        chars[i].className = 'ch correct';
      } else {
        chars[i].className = 'ch wrong';
        errors++;
      }
    }
  }

  // handle backspace
  if (tLen < curIdx) {
    for (var j = curIdx - 1; j >= tLen; j--) {
      if (j < 0 || j >= chars.length) continue;
      if (chars[j].classList.contains('wrong')) {
        errors = Math.max(0, errors - 1);
      }
      chars[j].className = 'ch';
    }
  }

  curIdx = tLen;

  // move cursor highlight
  chars.forEach(function(sp) { sp.classList.remove('cursor'); });
  if (curIdx < chars.length) {
    chars[curIdx].classList.add('cursor');
  }

  refreshStats();

  // finished all chars?
  if (curIdx >= chars.length) endGame();
});

// ── Stats ─────────────────────────────────────────────────────────────────────
function refreshWpm() {
  var elapsed = Math.max(1, timerMax - timeLeft);
  var wpm = Math.round((curIdx / 5) / elapsed * 60);
  elWpm.textContent = wpm;
}

function refreshStats() {
  refreshWpm();
  var acc = totalTyped > 0
    ? Math.max(0, Math.round((totalTyped - errors) / totalTyped * 100))
    : 100;
  elAcc.textContent = acc;
  elErr.textContent = errors;
}

// ── End ───────────────────────────────────────────────────────────────────────
function endGame() {
  if (finished) return;
  finished = true;
  clearInterval(ticker);
  elBox.disabled = true;
  chars.forEach(function(sp) { sp.classList.remove('cursor'); });

  var elapsed = Math.max(1, timerMax - timeLeft);
  var wpm = Math.round((curIdx / 5) / elapsed * 60);
  var acc = totalTyped > 0
    ? Math.max(0, Math.round((totalTyped - errors) / totalTyped * 100))
    : 100;

  // leaderboard
  var isNew = addLB(wpm, acc, errors);

  // show results
  elRwpm.textContent = wpm;
  elRacc.textContent = acc;
  elRerr.textContent = errors;
  elRchr.textContent = curIdx;
  elNewBest.style.display = isNew ? 'inline-block' : 'none';

  renderLB();
  elOverlay.classList.add('show');
  document.getElementById('btn-again').focus();
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function lbKey() { return 'lb_' + selDiff.value + '_' + selTime.value; }

function loadLB() {
  try { return JSON.parse(localStorage.getItem(lbKey())) || []; }
  catch(e) { return []; }
}

function saveLB(arr) {
  try { localStorage.setItem(lbKey(), JSON.stringify(arr)); } catch(e) {}
}

function addLB(wpm, acc, errs) {
  var arr = loadLB();
  var entry = { wpm: wpm, acc: acc, errs: errs, date: new Date().toLocaleDateString() };
  arr.push(entry);
  arr.sort(function(a,b){ return b.wpm - a.wpm; });
  arr = arr.slice(0, 5);
  saveLB(arr);
  return arr[0].wpm === wpm;
}

function renderLB() {
  var arr = loadLB();
  elLbMode.textContent = '(' + selDiff.value + ' · ' + selTime.value + 's)';
  if (!arr.length) {
    elLbBody.innerHTML = '<tr><td colspan="5" class="empty">No runs yet — finish a test to appear here.</td></tr>';
    return;
  }
  var medals = ['gold','silver','bronze'];
  elLbBody.innerHTML = arr.map(function(e, i) {
    return '<tr class="' + (medals[i]||'') + '">' +
      '<td>' + (i+1) + '</td>' +
      '<td class="wpm-td">' + e.wpm + '</td>' +
      '<td>' + e.acc + '%</td>' +
      '<td>' + e.errs + '</td>' +
      '<td>' + e.date + '</td>' +
    '</tr>';
  }).join('');
}

// ── Buttons ───────────────────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', init);
document.getElementById('btn-again').addEventListener('click', init);
document.getElementById('btn-clear').addEventListener('click', function() {
  localStorage.removeItem(lbKey());
  renderLB();
});
document.getElementById('passage-wrap').addEventListener('click', function() {
  elBox.focus();
});
selDiff.addEventListener('change', init);
selTime.addEventListener('change', init);
document.addEventListener('keydown', function(e) {
  if (elOverlay.classList.contains('show') && e.key === 'Enter') init();
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
